# Example redactor configuration.
# Copy to `redactor.toml` (or `.redactor.toml`) anywhere at or above your working
# directory. Every field is optional — delete what you don't need. The tool works
# with zero config.

# Turn specific detectors off by their `name`.
# disabled_detectors = ["bearer_token"]

# Turn on detectors that ship disabled by default. The high-entropy detector is the
# noisiest one, so it's opt-in here. (An explicit `disabled_detectors` entry still wins.)
# enabled_detectors = ["high_entropy_string"]

# Change how placeholders look. `{label}` is the human name; `{suffix}` is the
# stable " #N" number (empty when a secret kind appears only once).
# placeholder_template = "[REDACTED: {label}{suffix}]"

# Whether repeated/distinct secrets get stable " #N" numbering. Default: true.
# stable_numbering = true

# Redact personally identifiable information (email, IPv4, phone, SSN, credit card).
# Off by default because PII is often legitimately part of the text. Default: false.
# redact_pii = true

# User-defined detectors. Each rule is an ordinary regex; `group` (optional) selects
# which capture group is the secret so surrounding context can be preserved.
# [[rules]]
# name = "acme_internal_token"
# label = "ACME Internal Token"
# pattern = "\\bACME-[A-Z0-9]{20}\\b"
# confidence = 0.95
# group = 0

[allowlist]
# Regex patterns tested against each detected value. Anything that matches is
# left untouched — use for documentation placeholders and known-safe examples.
patterns = [
    "example\\.com",
    "AKIAIOSFODNN7EXAMPLE",   # AWS's own documentation key
    "sk-xxxx",                # common placeholder style
]

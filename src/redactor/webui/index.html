<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>redactor — local text sanitizer</title>
<style>
  :root {
    --bg: #0f1420; --panel: #171d2b; --panel-2: #1e2637; --border: #2a3346;
    --text: #e7ecf4; --muted: #8a97ad; --accent: #5b9dff; --mark: #3a2a12;
    --mark-border: #b5822e; --good: #2fbf71;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0; background: var(--bg); color: var(--text);
    font: 15px/1.5 system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
  }
  header {
    padding: 18px 24px; border-bottom: 1px solid var(--border);
    display: flex; align-items: baseline; gap: 14px; flex-wrap: wrap;
  }
  header h1 { font-size: 18px; margin: 0; letter-spacing: .2px; }
  header .sub { color: var(--muted); font-size: 13px; }
  .badge {
    margin-left: auto; font-size: 12px; color: var(--good);
    border: 1px solid #1f4c37; background: #0f2419; padding: 3px 10px; border-radius: 999px;
  }
  main { padding: 20px 24px; max-width: 1200px; margin: 0 auto; }
  .toolbar { display: flex; align-items: center; gap: 16px; margin-bottom: 14px; flex-wrap: wrap; }
  .toolbar label { display: flex; align-items: center; gap: 8px; color: var(--muted); cursor: pointer; }
  .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
  @media (max-width: 820px) { .grid { grid-template-columns: 1fr; } }
  .pane { background: var(--panel); border: 1px solid var(--border); border-radius: 12px; overflow: hidden; }
  .pane .cap {
    display: flex; align-items: center; justify-content: space-between;
    padding: 10px 14px; background: var(--panel-2); border-bottom: 1px solid var(--border);
    font-size: 13px; color: var(--muted);
  }
  textarea {
    width: 100%; height: 46vh; resize: vertical; border: 0; outline: 0;
    background: transparent; color: var(--text); padding: 14px;
    font: 13px/1.6 "SF Mono", "JetBrains Mono", Menlo, Consolas, monospace;
  }
  #out {
    height: 46vh; overflow: auto; margin: 0; padding: 14px; white-space: pre-wrap; word-break: break-word;
    font: 13px/1.6 "SF Mono", "JetBrains Mono", Menlo, Consolas, monospace;
  }
  mark {
    background: var(--mark); color: #f3c98b; border: 1px solid var(--mark-border);
    border-radius: 5px; padding: 0 4px;
  }
  button {
    background: var(--accent); color: #06122b; border: 0; border-radius: 8px;
    padding: 7px 14px; font-weight: 600; cursor: pointer; font-size: 13px;
  }
  button.ghost { background: transparent; color: var(--text); border: 1px solid var(--border); }
  button:active { transform: translateY(1px); }
  .chips { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 14px; min-height: 26px; }
  .chip {
    font-size: 12px; color: var(--text); background: var(--panel-2);
    border: 1px solid var(--border); border-radius: 999px; padding: 3px 11px;
  }
  .chip b { color: var(--accent); }
  .empty { color: var(--muted); font-size: 13px; }
  input[type=checkbox] { accent-color: var(--accent); width: 16px; height: 16px; }
</style>
</head>
<body>
<header>
  <h1>🛡️ redactor</h1>
  <span class="sub">Paste text, get a copy that's safe to share with an AI assistant.</span>
  <span class="badge">● 100% local</span>
</header>

<main>
  <div class="toolbar">
    <label><input type="checkbox" id="pii"> Also redact personal info (email, IP, phone, SSN, cards)</label>
    <span id="status" class="empty" style="margin-left:auto"></span>
  </div>

  <div class="grid">
    <div class="pane">
      <div class="cap"><span>Input</span><button class="ghost" id="clear">Clear</button></div>
      <textarea id="in" placeholder="Paste logs, config, code, terminal output…"></textarea>
    </div>
    <div class="pane">
      <div class="cap"><span>Sanitized</span><button id="copy">Copy</button></div>
      <div id="out"><span class="empty">Sanitized text appears here.</span></div>
    </div>
  </div>

  <div class="chips" id="chips"></div>
</main>

<script>
const inEl = document.getElementById('in');
const outEl = document.getElementById('out');
const chips = document.getElementById('chips');
const pii = document.getElementById('pii');
const status = document.getElementById('status');
let timer = null, lastSanitized = '';

function escapeHtml(s) {
  return s.replace(/[&<>]/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;'}[c]));
}
// Highlight [REDACTED: ...] placeholders in the output.
function render(text) {
  const html = escapeHtml(text).replace(/\[REDACTED:[^\]]*\]/g, m => `<mark>${m}</mark>`);
  outEl.innerHTML = html || '<span class="empty">Sanitized text appears here.</span>';
}

async function run() {
  const text = inEl.value;
  if (!text.trim()) {
    lastSanitized = '';
    render(''); chips.innerHTML = ''; status.textContent = '';
    return;
  }
  status.textContent = 'scanning…';
  try {
    const res = await fetch('/api/sanitize', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({text, redact_pii: pii.checked})
    });
    const data = await res.json();
    lastSanitized = data.sanitized;
    render(data.sanitized);
    chips.innerHTML = data.count === 0
      ? '<span class="empty">No sensitive data detected.</span>'
      : data.summary.map(s => `<span class="chip">${escapeHtml(s.label)} <b>${s.n}</b></span>`).join('');
    status.textContent = data.count === 0 ? 'clean' : `${data.count} redaction(s)`;
  } catch (e) {
    status.textContent = 'error — is the server still running?';
  }
}

function debounced() { clearTimeout(timer); timer = setTimeout(run, 300); }

inEl.addEventListener('input', debounced);
pii.addEventListener('change', run);
document.getElementById('clear').addEventListener('click', () => { inEl.value=''; run(); inEl.focus(); });
document.getElementById('copy').addEventListener('click', async () => {
  if (!lastSanitized) return;
  await navigator.clipboard.writeText(lastSanitized);
  const b = document.getElementById('copy'); b.textContent = 'Copied ✓';
  setTimeout(() => b.textContent = 'Copy', 1200);
});
</script>
</body>
</html>
